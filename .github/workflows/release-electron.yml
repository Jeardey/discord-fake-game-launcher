name: Release (Electron Installer)

on:
  push:
    tags:
      - 'release_*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: ver
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          if [[ "$tag" =~ ^release_([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            version="${BASH_REMATCH[1]}"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "Version: $version"
          else
            echo "Tag '$tag' does not match release_X.Y.Z" >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Discord Fake Game Launcher ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false

  publish-windows:
    needs: create-release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install Electron dependencies
        run: |
          cd electron
          npm install --no-audit --no-fund

      - name: Set Electron app version
        shell: pwsh
        run: |
          $v = "${{ needs.create-release.outputs.version }}"
          Push-Location electron
          npm version $v --no-git-tag-version
          Pop-Location

      - name: Build and stage DummyGame (Windows)
        run: |
          cd electron
          npm run build:dummy:win
          npm run prepare:dummy:win

      - name: Build and publish installer + latest.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd electron
          npm run dist:publish:win

